# Netlify Configuration for VishwaGuru Frontend

[build]
  # Execute from root or frontend base directory (flexible)
  publish = "frontend/dist"
  command = "if [ -d \"frontend\" ]; then cd frontend; fi && npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"
  # NODE_ENV is set to "production" by default on Netlify

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
