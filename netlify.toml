[build]
  publish = "frontend/dist"
  command = "npm install --prefix frontend && npm run build --prefix frontend"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://vishwaguru-backend.onrender.com/api/:splat"
  status = 200
  force = true
