# Netlify Configuration for VishwaGuru Frontend

[build]
  base = "frontend"
  publish = "dist"
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"
  NPM_FLAGS = "--no-audit --no-fund"

# Redirects for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
