# Netlify Configuration for VishwaGuru Frontend

[build]
  # Remove "base" to run from root context
  # Run the build command inside the frontend directory
  command = "cd frontend && npm install && npm run build"
  # Publish directory relative to the root
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"
  # NODE_ENV is set to "production" by default on Netlify

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
