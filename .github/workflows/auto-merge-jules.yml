name: Auto-Merge Jules PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write
  checks: read

jobs:
  auto-merge:
    if: |
      github.event.pull_request.user.login == 'google-labs-jules[bot]' ||
      github.event.pull_request.user.login == 'google-labs-jules'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for required checks
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          running-workflow-name: 'Auto-Merge Jules PRs'
          wait-interval: 15

      - name: Enable auto-merge
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
